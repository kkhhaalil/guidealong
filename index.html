<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#14342b">
<title>黄石国家公园 · GPS 语音导览</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌋</text></svg>">
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- 启动页 -->
<div id="start-overlay">
  <div class="cover">
    <div class="cover-art">🌋</div>
    <div class="cover-badge">离线可用 · 无需网络</div>
  </div>
  <div class="start-body">
    <h1>黄石国家公园</h1>
    <p class="subtitle">GPS 自动触发 · 中文语音导览</p>
    <p class="desc">沿大环线行驶，接近景点时讲解将自动播放。全程 25 站，覆盖老忠实、大棱镜温泉、黄石大峡谷、猛犸热泉等经典地标。</p>
    <div class="start-stats">
      <div><b>25</b><span>语音站点</span></div>
      <div><b>304</b><span>公里环线</span></div>
      <div><b>100%</b><span>离线运行</span></div>
    </div>
    <button id="btn-start-sim" class="btn primary">▶&nbsp; 模拟驾驶体验</button>
    <button id="btn-start-gps" class="btn secondary">📍&nbsp; 使用真实 GPS（在园内时）</button>
  </div>
</div>

<!-- 主界面 -->
<div id="app" hidden>
  <div id="map"></div>

  <header id="topbar">
    <div class="topbar-title">
      <b>黄石国家公园</b>
      <span id="mode-badge">模拟驾驶</span>
    </div>
    <div class="topbar-actions">
      <button id="btn-speed" title="模拟速度">×8</button>
      <button id="btn-pause-sim" title="暂停/继续">⏸</button>
      <button id="btn-locate" title="回到当前位置">🎯</button>
      <button id="btn-list" title="站点列表">☰</button>
    </div>
  </header>

  <!-- 触发提示横幅 -->
  <div id="trigger-banner" hidden></div>

  <!-- 底部播放器 -->
  <div id="player">
    <div id="player-idle">
      <span class="pulse-dot"></span>
      <div>
        <div class="idle-title">行驶中，请欣赏沿途风景</div>
        <div class="idle-sub" id="next-stop-hint">接近景点时讲解将自动播放</div>
      </div>
    </div>
    <div id="player-active" hidden>
      <div class="np-head">
        <div class="np-icon" id="np-icon">♨️</div>
        <div class="np-meta">
          <div class="np-name" id="np-name"></div>
          <div class="np-sub" id="np-sub">正在播放</div>
        </div>
        <button id="btn-play" class="np-btn">⏸</button>
        <button id="btn-skip" class="np-btn">⏭</button>
      </div>
      <div class="np-progress"><div id="np-bar"></div></div>
    </div>
  </div>

  <!-- 站点列表 -->
  <div id="stops-panel" hidden>
    <div class="panel-head">
      <b>站点列表</b>
      <span id="progress-count"></span>
      <button id="btn-reset" title="重置收听进度">重置</button>
      <button id="btn-close-list">✕</button>
    </div>
    <ul id="stops-list"></ul>
  </div>

  <audio id="narrator" preload="none"></audio>
</div>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="js/tour-data.js"></script>
<script src="js/route-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
