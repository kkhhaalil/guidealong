name: CI

on:
  push:
    branches:
      - main
      - 'cursor/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (coverage)
        run: npm test -- --run --coverage

      - name: Build
        run: npm run build

      - name: Budget check
        run: npm run check:budgets

      - name: Contrast check
        run: npm run check:contrast

      # ubuntu-latest runners ship Google Chrome stable; the Playwright config
      # defaults to /usr/bin/google-chrome-stable when no env override is set.
      - name: Verify system Chrome
        run: google-chrome-stable --version

      # Visual-regression baselines are rendered with these fonts. Bare
      # runners have no CJK font (Chinese renders as tofu) and resolve the
      # playback glyphs to color emoji, which blows the screenshot diffs.
      - name: Install fonts matching the baseline environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-core fonts-noto-color-emoji fonts-wqy-microhei fonts-droid-fallback
          sudo fc-cache -f

      - name: E2E (functional, a11y, visual, PWA)
        run: npm run e2e

      - name: Lighthouse performance
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
          NO_PROXY: localhost,127.0.0.1
        run: npm run check:lighthouse

      - name: Recipe eval
        run: npm run check:recipe

      - name: Upload Playwright results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          # Default reporter is 'list' (no HTML report dir); traces and
          # expected/actual/diff screenshots live in test-results/.
          path: app/test-results/
          if-no-files-found: ignore

      - name: Upload Lighthouse JSON on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouse/report.json
          if-no-files-found: ignore
