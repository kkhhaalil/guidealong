name: CI

on:
  push:
    branches:
      - main
      - 'cursor/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (coverage)
        run: npm test -- --run --coverage

      - name: Build
        run: npm run build

      - name: Budget check
        run: npm run check:budgets

      - name: Contrast check
        run: npm run check:contrast

      - name: Install Playwright Chrome
        id: pw-chrome
        run: |
          npx playwright install --with-deps chrome
          CHROME="$(find "$HOME/.cache/ms-playwright" -name chrome -path '*/chrome-linux/*' -type f 2>/dev/null | head -1)"
          echo "path=${CHROME}" >> "$GITHUB_OUTPUT"

      - name: E2E (functional, a11y, visual, PWA)
        env:
          PLAYWRIGHT_CHROME_PATH: ${{ steps.pw-chrome.outputs.path }}
        run: npm run e2e

      - name: Lighthouse performance
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
          NO_PROXY: localhost,127.0.0.1
        run: npm run check:lighthouse

      - name: Recipe eval
        run: npm run check:recipe

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          if-no-files-found: ignore

      - name: Upload Lighthouse JSON on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouse/report.json
          if-no-files-found: ignore
